<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self' data:;" />
  <title>WebPilot</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0e0e10;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .logo {
      width: 144px;
      height: 144px;
      animation: float 3.4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .wordmark {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .status {
      font-size: 14px;
      color: #8b8b94;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 20px;
    }
    .status .dots {
      display: inline-flex;
      gap: 3px;
    }
    .status .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #8b8b94;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .status .dots span:nth-child(2) { animation-delay: 0.15s; }
    .status .dots span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="splash-logo.png" alt="WebPilot" />
    <h1 class="wordmark">WebPilot</h1>
    <div class="status">
      <span>Starting</span>
      <span class="dots"><span></span><span></span><span></span></span>
    </div>
  </div>
</body>
</html>
