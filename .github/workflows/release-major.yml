name: Release (major)

# Manually-dispatched major release.
#
# 1. Compute next major version from root package.json (X.Y.Z -> (X+1).0.0).
# 2. Run scripts/bump-version.js <next> to sync all package.json / manifest /
#    package-lock files across the monorepo.
# 3. Commit the bump to main as github-actions[bot].
# 4. Tag v<next> and push commit + tag.
# 5. Invoke release.yml via workflow_call to build + publish the GitHub Release.
#
# Branch protection note: this workflow pushes directly to main. If main has
# protection rules that block direct pushes (including from GITHUB_TOKEN /
# github-actions[bot]), the push will fail. Either allow the bot through, or
# accept that releases require a manual local tag push instead.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump (major) + tag + push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute next major version
        id: compute
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const current = pkg.version;
            const parts = current.split('.').map(Number);
            if (parts.length !== 3 || parts.some(n => Number.isNaN(n))) {
              core.setFailed('Cannot parse current version: ' + current);
              return;
            }
            const [maj] = parts;
            const next = (maj + 1) + '.0.0';
            const tag = 'v' + next;
            core.info('major bump: ' + current + ' -> ' + next);
            core.setOutput('version', next);
            core.setOutput('tag', tag);

      - name: Bump version across monorepo
        run: node scripts/bump-version.js ${{ steps.compute.outputs.version }}

      # Re-sign the formatter + blocklist manifests for this release so
      # the signed-manifest.json + .sig committed to main always match
      # the formatter sources at the released tag. See SECURITY.md and
      # CONTRIBUTING.md for the threat model.
      - name: Sign formatter + blocklist manifests
        env:
          WEBPILOT_SIGNING_KEY_BASE64: ${{ secrets.WEBPILOT_SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${WEBPILOT_SIGNING_KEY_BASE64:-}" ]; then
            echo "ERROR: WEBPILOT_SIGNING_KEY_BASE64 secret is not set."
            echo "Add the base64-encoded Ed25519 signing key to the repo secrets"
            echo "before cutting a release. See CONTRIBUTING.md > Signing formatter releases."
            exit 1
          fi
          KEYFILE="$(mktemp -t webpilot-signing-key.XXXXXX)"
          trap 'rm -f "$KEYFILE"' EXIT
          printf '%s' "$WEBPILOT_SIGNING_KEY_BASE64" | base64 -d > "$KEYFILE"
          chmod 600 "$KEYFILE"
          WEBPILOT_SIGNING_KEY="$KEYFILE" node scripts/sign-formatters.js

      - name: Commit + tag + push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore(release): ${{ steps.compute.outputs.tag }}"
          git tag ${{ steps.compute.outputs.tag }}
          git push origin HEAD:main
          git push origin ${{ steps.compute.outputs.tag }}

  release:
    name: Build + publish
    needs: bump-and-tag
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.bump-and-tag.outputs.version }}
      tag: ${{ needs.bump-and-tag.outputs.tag }}
    secrets: inherit
