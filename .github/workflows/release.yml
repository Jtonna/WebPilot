name: Release

# Three trigger paths:
#
#   1. workflow_call        -- invoked by release-patch.yml / release-minor.yml /
#                              release-major.yml after they have already bumped
#                              + tagged + pushed. Builds and publishes.
#
#   2. push of a v* tag     -- an out-of-band manual release (user pushed a tag
#                              locally). Builds and publishes. No bump.
#
#   3. workflow_dispatch    -- manual "Run workflow" from the Actions tab.
#                              Builds; only publishes a release if dry_run=false.
#                              Uses whatever version is in package.json at the
#                              chosen ref.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish a GitHub Release.'
        type: boolean
        default: true
  workflow_call:
    inputs:
      version:
        description: 'Semver X.Y.Z to release (must already be committed + tagged).'
        type: string
        required: true
      tag:
        description: 'Tag name, e.g. v1.2.3 (must already exist on origin).'
        type: string
        required: true

permissions:
  contents: write

jobs:
  decide:
    name: Decide version + action
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      ref: ${{ steps.plan.outputs.ref }}
      should_release: ${{ steps.plan.outputs.should_release }}
      should_build: ${{ steps.plan.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: plan
        uses: actions/github-script@v7
        env:
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          CALL_VERSION: ${{ inputs.version }}
          CALL_TAG: ${{ inputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const ref = context.ref;
            const event = context.eventName;
            const isTagPush = event === 'push' && ref.startsWith('refs/tags/v');
            // GitHub reports event_name as the CALLER's event for reusable
            // workflows, so context.eventName is 'workflow_dispatch' for both
            // a direct manual dispatch and a release-{patch,minor,major}.yml
            // dispatcher calling us. Detect the workflow_call case via the
            // inputs that only the dispatchers set.
            const isCall = !!process.env.CALL_VERSION && !!process.env.CALL_TAG;
            const isDispatch = event === 'workflow_dispatch' && !isCall;

            function readVersion() {
              return JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
            }

            function emit({version, tag, refOut, shouldRelease, shouldBuild}) {
              core.setOutput('version', version || '');
              core.setOutput('tag', tag || '');
              core.setOutput('ref', refOut || '');
              core.setOutput('should_release', shouldRelease ? 'true' : 'false');
              // Default: build whenever we'd release; dispatch with dry_run=true
              // overrides to build-but-not-release.
              const sb = shouldBuild === undefined ? !!shouldRelease : !!shouldBuild;
              core.setOutput('should_build', sb ? 'true' : 'false');
            }

            // ---- workflow_call: dispatcher already bumped + tagged ----
            if (isCall) {
              const version = process.env.CALL_VERSION;
              const tag = process.env.CALL_TAG;
              if (!version || !tag) {
                core.setFailed('workflow_call requires version + tag inputs.');
                return;
              }
              core.info('workflow_call: ' + tag + ' -> build + release');
              return emit({version, tag, refOut: tag, shouldRelease: true});
            }

            // ---- Tag push: build + release the tagged version ----
            if (isTagPush) {
              const tag = ref.replace('refs/tags/', '');
              const version = tag.replace(/^v/, '');
              core.info('Tag push: ' + tag + ' -> build + release');
              return emit({version, tag, refOut: tag, shouldRelease: true});
            }

            // ---- workflow_dispatch: dry-run build, optionally release ----
            if (isDispatch) {
              const dryRun = process.env.DISPATCH_DRY_RUN !== 'false';
              const version = readVersion();
              core.info('Manual dispatch: version=' + version + ' dry_run=' + dryRun);
              return emit({
                version,
                tag: 'v' + version,
                refOut: context.ref,
                shouldRelease: !dryRun,
                shouldBuild: true
              });
            }

            core.info('Unsupported event -- nothing to do.');
            return emit({shouldRelease: false});

  build:
    name: Build (windows)
    needs: decide
    # Mac + Linux build legs are intentionally disabled until those platforms
    # are functionally verified. Tracked in issues #48 (macOS) and #49 (Linux).
    if: needs.decide.outputs.should_build == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout source (single-ref, case-collision-safe)
        shell: bash
        run: |
          set -euo pipefail
          REF='${{ needs.decide.outputs.ref }}'
          # Strip 'refs/heads/' prefix if present so 'git fetch' treats it as a
          # branch name. Tag refs ('refs/tags/v...') are passed through.
          if [[ "$REF" == refs/heads/* ]]; then
            REF="${REF#refs/heads/}"
          fi
          echo "Resolved ref: $REF"
          git init -q .
          git config --local advice.detachedHead false
          git remote add origin "https://github.com/${{ github.repository }}.git"
          # Fetch ONLY the target ref to avoid Windows case-insensitive FS
          # collisions between FEAT/ and feat/ prefixed branches.
          git fetch --no-tags origin "$REF"
          git checkout --detach FETCH_HEAD
          echo "Checked out at:"
          git log -1 --oneline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Sign the formatter + blocklist manifests with the release signing
      # key BEFORE building. The build pulls the signed-manifest.json +
      # .sig into the binary's source tree (committed to the branch by
      # release-{patch,minor,major}.yml). Re-running the signing step
      # here is idempotent — the stable-stringify in sign-formatters.js
      # produces byte-identical output for the same input files, so the
      # signature won't drift unless an actual file changed.
      #
      # Skipped when WEBPILOT_SIGNING_KEY_BASE64 isn't set so a
      # fork without the secret can still run the build to smoke-test
      # CI changes. Production releases MUST have the secret set or
      # signed manifests on the branch will go stale.
      - name: Sign formatter + blocklist manifests
        shell: bash
        env:
          WEBPILOT_SIGNING_KEY_BASE64: ${{ secrets.WEBPILOT_SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "${WEBPILOT_SIGNING_KEY_BASE64:-}" ]; then
            echo "WEBPILOT_SIGNING_KEY_BASE64 not set — skipping in-CI sign step."
            echo "Signed manifests already committed to the branch will still be shipped."
            exit 0
          fi
          set -euo pipefail
          KEYFILE="$(mktemp -t webpilot-signing-key.XXXXXX)"
          trap 'rm -f "$KEYFILE"' EXIT
          # Strip whitespace before decoding — GitHub Actions secrets set via
          # piped stdin can carry trailing CRLF/LF that breaks base64 -d.
          printf '%s' "$WEBPILOT_SIGNING_KEY_BASE64" | tr -d '[:space:]' | base64 -d > "$KEYFILE"
          chmod 600 "$KEYFILE" || true
          WEBPILOT_SIGNING_KEY="$KEYFILE" node scripts/sign-formatters.js

      - name: Build & package
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpilot-win
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [decide, build]
    if: needs.decide.outputs.should_release == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.decide.outputs.tag }}
          name: ${{ needs.decide.outputs.tag }}
          files: artifacts/**/*
          body: |
            ## Downloads

            | Platform | Installer |
            |----------|-----------|
            | Windows  | `WebPilot-${{ needs.decide.outputs.version }}-windows.exe` |

            macOS and Linux builds are not yet shipping — tracked in [#48](https://github.com/Jtonna/WebPilot/issues/48) and [#49](https://github.com/Jtonna/WebPilot/issues/49).

            ### Installation
            **Windows** — Run the `.exe` installer. SmartScreen warning expected (unsigned).
