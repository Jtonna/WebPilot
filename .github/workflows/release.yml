name: Release

# Three trigger paths:
#
#   1. workflow_call        -- invoked by release-patch.yml / release-minor.yml /
#                              release-major.yml after they have already bumped
#                              + tagged + pushed. Builds and publishes.
#
#   2. push of a v* tag     -- an out-of-band manual release (user pushed a tag
#                              locally). Builds and publishes. No bump.
#
#   3. workflow_dispatch    -- manual "Run workflow" from the Actions tab.
#                              Builds; only publishes a release if dry_run=false.
#                              Uses whatever version is in package.json at the
#                              chosen ref.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish a GitHub Release.'
        type: boolean
        default: true
  workflow_call:
    inputs:
      version:
        description: 'Semver X.Y.Z to release (must already be committed + tagged).'
        type: string
        required: true
      tag:
        description: 'Tag name, e.g. v1.2.3 (must already exist on origin).'
        type: string
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  decide:
    name: Decide version + action
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      ref: ${{ steps.plan.outputs.ref }}
      should_release: ${{ steps.plan.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: plan
        uses: actions/github-script@v7
        env:
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          CALL_VERSION: ${{ inputs.version }}
          CALL_TAG: ${{ inputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const ref = context.ref;
            const event = context.eventName;
            const isTagPush = event === 'push' && ref.startsWith('refs/tags/v');
            const isDispatch = event === 'workflow_dispatch';
            const isCall = event === 'workflow_call';

            function readVersion() {
              return JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
            }

            function emit({version, tag, refOut, shouldRelease}) {
              core.setOutput('version', version || '');
              core.setOutput('tag', tag || '');
              core.setOutput('ref', refOut || '');
              core.setOutput('should_release', shouldRelease ? 'true' : 'false');
            }

            // ---- workflow_call: dispatcher already bumped + tagged ----
            if (isCall) {
              const version = process.env.CALL_VERSION;
              const tag = process.env.CALL_TAG;
              if (!version || !tag) {
                core.setFailed('workflow_call requires version + tag inputs.');
                return;
              }
              core.info('workflow_call: ' + tag + ' -> build + release');
              return emit({version, tag, refOut: tag, shouldRelease: true});
            }

            // ---- Tag push: build + release the tagged version ----
            if (isTagPush) {
              const tag = ref.replace('refs/tags/', '');
              const version = tag.replace(/^v/, '');
              core.info('Tag push: ' + tag + ' -> build + release');
              return emit({version, tag, refOut: tag, shouldRelease: true});
            }

            // ---- workflow_dispatch: dry-run build, optionally release ----
            if (isDispatch) {
              const dryRun = process.env.DISPATCH_DRY_RUN !== 'false';
              const version = readVersion();
              core.info('Manual dispatch: version=' + version + ' dry_run=' + dryRun);
              return emit({
                version,
                tag: 'v' + version,
                refOut: context.ref,
                shouldRelease: !dryRun
              });
            }

            core.info('Unsupported event -- nothing to do.');
            return emit({shouldRelease: false});

  build:
    name: Build (windows)
    needs: decide
    # Mac + Linux build legs are intentionally disabled until those platforms
    # are functionally verified. Tracked in issues #48 (macOS) and #49 (Linux).
    if: needs.decide.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpilot-win
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [decide, build]
    if: needs.decide.outputs.should_release == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.decide.outputs.tag }}
          name: ${{ needs.decide.outputs.tag }}
          files: artifacts/**/*
          body: |
            ## Downloads

            | Platform | Installer |
            |----------|-----------|
            | Windows  | `WebPilot-${{ needs.decide.outputs.version }}-windows.exe` |

            macOS and Linux builds are not yet shipping — tracked in [#48](https://github.com/Jtonna/WebPilot/issues/48) and [#49](https://github.com/Jtonna/WebPilot/issues/49).

            ### Installation
            **Windows** — Run the `.exe` installer. SmartScreen warning expected (unsigned).
